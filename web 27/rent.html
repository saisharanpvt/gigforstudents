<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIG | Student Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030014;
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --neon-blue: #00F0FF;
            --neon-purple: #7000FF;
            --neon-green: #00E676;
            --glass-panel: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.05) 0%, transparent 60%);
            padding-bottom: 80px;
        }

        /* --- HEADER --- */
        header {
            display: flex; align-items: center; gap: 15px;
            padding: 15px 20px; position: sticky; top: 0; z-index: 100;
            background: rgba(3, 0, 20, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light);
        }
        .back-btn { text-decoration: none; font-size: 22px; color: white; }
        .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* --- FILTER BAR --- */
        .filter-bar {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        
        .filter-chip {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border-light);
            background: rgba(255,255,255,0.05); color: var(--text-muted);
            font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: 0.3s;
        }
        .filter-chip.active {
            background: rgba(0, 240, 255, 0.15); border-color: var(--neon-blue); color: white;
        }

        /* --- ITEM GRID --- */
        .items-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px; /* Single column for detailed view on mobile */
        }
        @media(min-width: 600px) { .items-grid { grid-template-columns: 1fr 1fr; } }

        .item-card {
            background: var(--glass-panel); border: 1px solid var(--border-light);
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
            transition: 0.3s; padding: 15px; position: relative;
        }
        .item-card:hover { border-color: var(--neon-blue); background: rgba(0, 240, 255, 0.05); }

        .user-row {
            display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;
        }
        .u-name { font-weight: 700; font-size: 16px; color: white; display: block; }
        .u-pin { font-family: monospace; color: var(--neon-blue); font-size: 12px; display: block; }
        
        .item-details { flex: 1; margin-bottom: 15px; }
        .i-name { font-size: 18px; font-weight: 800; color: white; margin-bottom: 4px; font-family: 'Space Grotesk', sans-serif; }
        .i-category { 
            display: inline-block; background: rgba(112, 0, 255, 0.2); color: var(--neon-purple);
            font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase;
        }
        .i-cost { color: var(--neon-green); font-weight: 700; font-size: 14px; }

        .contact-box {
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .c-number { font-family: monospace; color: #ccc; font-size: 14px; }
        .btn-copy {
            background: var(--neon-blue); color: black; border: none; padding: 4px 10px;
            border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer;
        }

        /* --- FAB --- */
        .fab-add {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; cursor: pointer; z-index: 90;
            border: none; transition: 0.3s;
        }
        .fab-add:hover { transform: scale(1.1); }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-sheet {
            background: #0F172A; width: 100%; max-width: 500px;
            border-radius: 24px 24px 0 0; padding: 25px;
            border-top: 1px solid var(--neon-blue);
            animation: slideUp 0.3s ease;
        }
        .modal-header { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; color: white; }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        
        /* Fixed Styling for Inputs & Select */
        .form-input, .form-select {
            width: 100%; padding: 14px; background: #1E293B; /* Darker bg for contrast */
            border: 1px solid var(--border-light); border-radius: 12px;
            color: white; outline: none; font-size: 14px; appearance: none;
        }
        .form-select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300F0FF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }
        
        .btn-submit {
            width: 100%; padding: 14px; background: var(--neon-blue); color: black;
            border: none; border-radius: 12px; font-weight: 800; font-size: 14px;
            margin-top: 10px; cursor: pointer;
        }
        .btn-cancel {
            width: 100%; padding: 14px; background: transparent; color: var(--text-muted);
            border: none; font-weight: 600; cursor: pointer; margin-top: 5px;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    </style>
</head>
<body>

    <header>
        <a href="homepage.html" class="back-btn">←</a>
        <div class="page-title">Rent & Buy</div>
    </header>

    <div class="container">
        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterItems('all', this)">All</div>
            <div class="filter-chip" onclick="filterItems('lab', this)">Lab Coat</div>
            <div class="filter-chip" onclick="filterItems('drawing', this)">Drafter/Drawing</div>
            <div class="filter-chip" onclick="filterItems('tech', this)">Calculator/Tech</div>
            <div class="filter-chip" onclick="filterItems('books', this)">Books</div>
        </div>

        <div class="items-grid" id="rentalContainer">
            </div>
        
        <div id="emptyState" style="text-align:center; padding:40px; color:#666; display:none;">
            No items found. Be the first to add one!
        </div>
    </div>

    <button class="fab-add" onclick="openAddModal()">+</button>

    <div id="addModal" class="modal-overlay">
        <div class="modal-sheet">
            <div class="modal-header">List Your Item</div>
            
            <div style="margin-bottom:15px; padding:10px; background:rgba(0, 240, 255, 0.1); border-radius:8px;">
                <div style="font-size:10px; color:var(--text-muted);">POSTING AS</div>
                <div style="color:var(--neon-blue); font-weight:bold;" id="postingAsName">Loading...</div>
                <div style="font-size:10px; color:#fff;" id="postingAsPin">@...</div>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-select" id="inpCategory">
                    <option value="lab">Lab Coat / Apron</option>
                    <option value="drawing">Drafter / Drawing Kit</option>
                    <option value="tech">Calculator / Electronics</option>
                    <option value="books">Textbooks / Notes</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Item Name</label>
                <input type="text" class="form-input" id="inpItemName" placeholder="e.g. Casio fx-991ES Plus">
            </div>

            <div class="form-group">
                <label class="form-label">Rent / Cost (₹)</label>
                <input type="text" class="form-input" id="inpCost" placeholder="e.g. 20 per day OR 500 (Selling)">
            </div>

            <div class="form-group">
                <label class="form-label">Contact Number (WhatsApp)</label>
                <input type="tel" class="form-input" id="inpMobile" placeholder="Enter your mobile no.">
            </div>

            <button class="btn-submit" onclick="submitItem()">POST ITEM</button>
            <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
        </div>
    </div>

    <script>
        // MOCK DATA (Initial Population if empty)
        const initialData = [
            { id: 1, name: "Sai Sharan", pin: "23054-EV-037", item: "Lab Apron (White)", category: "lab", cost: "20 / Lab Session", mobile: "8985774997" },
            { id: 2, name: "K. Likhitha", pin: "23054-CCB-001", item: "Mini Drafter", category: "drawing", cost: "25 / Exam", mobile: "8885600216" },
            { id: 3, name: "H. Balaji", pin: "24054-CCB-049", item: "Scientific Calculator", category: "tech", cost: "30 / Day", mobile: "8331962066" }
        ];

        // LOAD RENTALS
        let rentals = JSON.parse(localStorage.getItem('gigRentals')) || initialData;

        // ON LOAD
        window.onload = function() {
            renderRentals('all');
            
            // Set User Info in Modal
            const user = JSON.parse(localStorage.getItem('gigUser'));
            if(user) {
                document.getElementById('postingAsName').innerText = user.name;
                document.getElementById('postingAsPin').innerText = user.pin;
                document.getElementById('inpMobile').value = user.mobile; // Auto-fill mobile
            }
        };

        // RENDER FUNCTION
        function renderRentals(filter) {
            const container = document.getElementById('rentalContainer');
            container.innerHTML = '';
            
            let count = 0;
            // Show newest first
            [...rentals].reverse().forEach(r => {
                if(filter === 'all' || r.category === filter) {
                    count++;
                    const html = `
                        <div class="item-card">
                            <div class="user-row">
                                <div>
                                    <span class="u-name">${r.name}</span>
                                    <span class="u-pin">${r.pin}</span>
                                </div>
                                <div class="i-category">${r.category}</div>
                            </div>
                            <div class="item-details">
                                <div class="i-name">${r.item}</div>
                                <div class="i-cost">₹ ${r.cost}</div>
                            </div>
                            <div class="contact-box">
                                <span class="c-number">📞 ${r.mobile}</span>
                                <button class="btn-copy" onclick="copyNum('${r.mobile}')">Copy</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                }
            });

            document.getElementById('emptyState').style.display = count === 0 ? 'block' : 'none';
        }

        // ADD ITEM LOGIC
        function submitItem() {
            const user = JSON.parse(localStorage.getItem('gigUser'));
            if(!user) { alert("Please login first!"); return; }

            const cat = document.getElementById('inpCategory').value;
            const item = document.getElementById('inpItemName').value;
            const cost = document.getElementById('inpCost').value;
            const mob = document.getElementById('inpMobile').value;

            if(!item || !cost || !mob) {
                alert("Please fill all details!");
                return;
            }

            const newItem = {
                id: Date.now(),
                name: user.name,
                pin: user.pin,
                item: item,
                category: cat,
                cost: cost,
                mobile: mob
            };

            rentals.push(newItem);
            localStorage.setItem('gigRentals', JSON.stringify(rentals));
            
            renderRentals('all');
            closeAddModal();
            
            // Clear inputs
            document.getElementById('inpItemName').value = '';
            document.getElementById('inpCost').value = '';
        }

        // FILTER
        function filterItems(cat, btn) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderRentals(cat);
        }

        // UTILS
        function copyNum(num) {
            navigator.clipboard.writeText(num);
            alert("Number copied: " + num);
        }

        function openAddModal() { document.getElementById('addModal').classList.add('open'); }
        function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

    </script>

</body>
</html>
