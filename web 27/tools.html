<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIG - Online Compiler</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
    
    <style>
        :root {
            --bg-deep: #030014;
            --editor-bg: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A3A3A3;
            --neon-blue: #00F0FF;
            --neon-green: #00E676;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background: #0a0a0a;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { text-decoration: none; font-size: 20px; color: white; }
        .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
        
        .run-btn {
            background: var(--neon-green); color: black; border: none;
            padding: 8px 24px; border-radius: 6px; font-weight: 800;
            font-family: 'Space Grotesk', sans-serif; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .run-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); }
        .run-btn:active { transform: scale(0.95); }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- HORIZONTAL LANGUAGE SELECTOR --- */
        .mode-bar {
            display: flex; gap: 12px; padding: 12px 20px;
            background: #0f0f15; overflow-x: auto; flex-shrink: 0;
            border-bottom: 1px solid var(--border-light);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .mode-bar::-webkit-scrollbar { display: none; }
        .mode-bar { -ms-overflow-style: none; scrollbar-width: none; }

        .mode-chip {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-width: 70px; padding: 10px 5px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-light);
            color: var(--text-muted); cursor: pointer; transition: 0.3s;
        }
        .mode-chip i { font-size: 26px; margin-bottom: 6px; }
        .mode-chip span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .mode-chip:hover { background: rgba(255,255,255,0.08); }
        .mode-chip.active {
            background: rgba(0, 240, 255, 0.1); border-color: var(--neon-blue); color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        /* --- WEB TABS --- */
        .web-tabs {
            display: none; gap: 2px; padding: 0 20px; background: #1a1a1a;
            border-bottom: 1px solid var(--border-light); flex-shrink: 0;
        }
        .web-tabs.show { display: flex; }
        .file-tab {
            padding: 8px 16px; font-size: 12px; color: #888; cursor: pointer;
            border-right: 1px solid var(--border-light); background: #111;
            font-family: 'Fira Code', monospace;
        }
        .file-tab.active { background: var(--editor-bg); color: #fff; border-top: 2px solid var(--neon-blue); }

        /* --- WORKSPACE --- */
        .workspace {
            flex: 1; display: flex; overflow: hidden; height: 100%; position: relative;
        }
        
        .editor-container {
            flex: 1; display: flex; flex-direction: column;
            background: var(--editor-bg); position: relative;
        }
        .code-area {
            flex: 1; background: transparent; border: none; color: #d4d4d4;
            font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.6;
            padding: 15px; resize: none; outline: none; white-space: pre;
        }

        .output-container {
            flex: 1; display: flex; flex-direction: column;
            background: #000; border-left: 1px solid var(--border-light);
        }
        .output-header {
            padding: 8px 15px; background: #111; border-bottom: 1px solid var(--border-light);
            font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700;
            display: flex; justify-content: space-between;
        }
        
        iframe.preview-frame { flex: 1; border: none; background: white; width: 100%; height: 100%; display: none; }
        .console-log {
            flex: 1; padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px;
            color: #ccc; overflow-y: auto; white-space: pre-wrap; display: none;
        }
        .loader { color: var(--neon-blue); display: none; padding: 20px; text-align: center; font-weight: bold; }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .output-container { border-left: none; border-top: 4px solid var(--border-light); height: 40%; }
            .editor-container { height: 60%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="homepage.html" class="back-btn">←</a>
            <div class="page-title">GIG Compiler</div>
        </div>
        <button class="run-btn" id="runBtn" onclick="executeCode()">
            <span>▶</span> RUN
        </button>
    </header>

    <div class="mode-bar">
        <div class="mode-chip active" onclick="switchMode('web')">
            <i class="devicon-html5-plain"></i><span>Web</span>
        </div>
        <div class="mode-chip" onclick="switchMode('python')">
            <i class="devicon-python-plain"></i><span>Python</span>
        </div>
        <div class="mode-chip" onclick="switchMode('c')">
            <i class="devicon-c-plain"></i><span>C</span>
        </div>
        <div class="mode-chip" onclick="switchMode('cpp')">
            <i class="devicon-cplusplus-plain"></i><span>C++</span>
        </div>
        <div class="mode-chip" onclick="switchMode('java')">
            <i class="devicon-java-plain"></i><span>Java</span>
        </div>
        <div class="mode-chip" onclick="switchMode('javascript')">
            <i class="devicon-javascript-plain"></i><span>Node JS</span>
        </div>
        <div class="mode-chip" onclick="switchMode('csharp')">
            <i class="devicon-csharp-plain"></i><span>C#</span>
        </div>
        <div class="mode-chip" onclick="switchMode('php')">
            <i class="devicon-php-plain"></i><span>PHP</span>
        </div>
        <div class="mode-chip" onclick="switchMode('go')">
            <i class="devicon-go-plain"></i><span>Go</span>
        </div>
        <div class="mode-chip" onclick="switchMode('rust')">
            <i class="devicon-rust-plain"></i><span>Rust</span>
        </div>
        <div class="mode-chip" onclick="switchMode('sqlite3')">
            <i class="devicon-mysql-plain"></i><span>SQL</span>
        </div>
    </div>

    <div class="web-tabs show" id="webTabs">
        <div class="file-tab active" onclick="switchWebTab('html')">index.html</div>
        <div class="file-tab" onclick="switchWebTab('css')">style.css</div>
        <div class="file-tab" onclick="switchWebTab('js')">script.js</div>
    </div>

    <div class="workspace">
        <div class="editor-container">
            <textarea id="codeEditor" class="code-area" spellcheck="false" placeholder="Write code here..."></textarea>
        </div>

        <div class="output-container">
            <div class="output-header">
                <span id="outputLabel">LIVE PREVIEW</span>
                <span onclick="clearOutput()" style="cursor:pointer; color:var(--neon-blue)">CLEAR</span>
            </div>
            
            <iframe id="webPreview" class="preview-frame" style="display:block;"></iframe>
            <div id="consoleOutput" class="console-log"></div>
            <div id="loader" class="loader">Compiling on Server...</div>
        </div>
    </div>

    <script>
        let currentMode = 'web'; 
        let currentWebFile = 'html'; 

        const codeStore = {
            'html': `<h1>Hello GIG!</h1>\n<p>Edit HTML, CSS, and JS tabs.</p>\n<button onclick="alert('Working!')">Click Me</button>`,
            'css': `body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }\nh1 { color: #007BFF; }`,
            'js': `console.log("Welcome to GIG Web Console");`,
            'python': `print("Hello from Python!")\nfor i in range(3):\n    print(f"Count: {i}")`,
            'c': `#include <stdio.h>\n\nint main() {\n    printf("Hello from C Language");\n    return 0;\n}`,
            'cpp': `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello from C++";\n    return 0;\n}`,
            'java': `public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello from Java");\n    }\n}`,
            'javascript': `console.log("Hello from Node.js!");\n[1,2,3].forEach(n => console.log(n));`,
            'csharp': `using System;\n\nclass Program {\n    static void Main() {\n        Console.WriteLine("Hello from C#");\n    }\n}`,
            'php': `<?php\n  echo "Hello from PHP!";\n?>`,
            'go': `package main\nimport "fmt"\n\nfunc main() {\n    fmt.Println("Hello from Go")\n}`,
            'rust': `fn main() {\n    println!("Hello from Rust!");\n}`,
            'sqlite3': `CREATE TABLE Students (\n  id INTEGER PRIMARY KEY,\n  name TEXT\n);\nINSERT INTO Students (name) VALUES ('Sai'), ('GIG');\nSELECT * FROM Students;`
        };

        // Piston API version mapping
        const langMap = {
            'python': { language: 'python', version: '3.10.0' },
            'c': { language: 'c', version: '10.2.0' },
            'cpp': { language: 'c++', version: '10.2.0' },
            'java': { language: 'java', version: '15.0.2' },
            'javascript': { language: 'javascript', version: '16.3.0' },
            'csharp': { language: 'csharp', version: '5.0.201' },
            'php': { language: 'php', version: '8.2.3' },
            'go': { language: 'go', version: '1.16.2' },
            'rust': { language: 'rust', version: '1.68.2' },
            'sqlite3': { language: 'sqlite3', version: '3.36.0' }
        };

        window.onload = function() {
            document.getElementById('codeEditor').value = codeStore['html'];
            updatePreview(); 
        };

        function switchMode(mode) {
            if(currentMode === 'web') codeStore[currentWebFile] = document.getElementById('codeEditor').value;
            else codeStore[currentMode] = document.getElementById('codeEditor').value;

            currentMode = mode;

            document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const webTabs = document.getElementById('webTabs');
            const preview = document.getElementById('webPreview');
            const consoleDiv = document.getElementById('consoleOutput');
            const label = document.getElementById('outputLabel');

            if (mode === 'web') {
                webTabs.classList.add('show');
                preview.style.display = 'block';
                consoleDiv.style.display = 'none';
                label.innerText = "LIVE PREVIEW";
                
                switchWebTab('html'); 
                document.querySelectorAll('.file-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.file-tab')[0].classList.add('active');
            } else {
                webTabs.classList.remove('show');
                preview.style.display = 'none';
                consoleDiv.style.display = 'block';
                label.innerText = "TERMINAL OUTPUT";
                
                document.getElementById('codeEditor').value = codeStore[mode];
                consoleDiv.innerText = "// Click RUN to execute code. Note: Piston API Whitelist required.";
                consoleDiv.style.color = "#ccc";
            }
        }

        function switchWebTab(fileType) {
            codeStore[currentWebFile] = document.getElementById('codeEditor').value;
            currentWebFile = fileType;

            document.querySelectorAll('.file-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active'); 
            document.getElementById('codeEditor').value = codeStore[fileType];
        }

        async function executeCode() {
            if (currentMode === 'web') {
                codeStore[currentWebFile] = document.getElementById('codeEditor').value;
                updatePreview();
            } else {
                const sourceCode = document.getElementById('codeEditor').value;
                const consoleDiv = document.getElementById('consoleOutput');
                const loader = document.getElementById('loader');
                const runBtn = document.getElementById('runBtn');

                consoleDiv.style.display = 'none';
                loader.style.display = 'block';
                runBtn.disabled = true;

                const langConfig = langMap[currentMode];

                try {
                    const response = await fetch('https://emkc.org/api/v2/piston/execute', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                            // NOTE: If EngineerMan gives you an API key, add it here like this:
                            // 'Authorization': 'YOUR_API_KEY_HERE'
                        },
                        body: JSON.stringify({
                            language: langConfig.language,
                            version: langConfig.version,
                            files: [{ content: sourceCode }]
                        })
                    });

                    const result = await response.json();
                    
                    loader.style.display = 'none';
                    consoleDiv.style.display = 'block';
                    runBtn.disabled = false;

                    if (result.run) {
                        let output = result.run.output;
                        if (output.trim() === "") output = "Process finished with exit code 0 (No Output)";
                        consoleDiv.innerText = output;
                        
                        if(result.run.stderr) {
                            consoleDiv.innerText += "\n\nError:\n" + result.run.stderr;
                            consoleDiv.style.color = "#FF5252"; 
                        } else {
                            consoleDiv.style.color = "#ccc";
                        }
                    } else if (result.message) {
                        consoleDiv.innerText = "API Error: " + result.message;
                        consoleDiv.style.color = "#FF5252";
                    } else {
                        consoleDiv.innerText = "Error: Could not connect to compiler server.";
                        consoleDiv.style.color = "#FF5252";
                    }

                } catch (error) {
                    loader.style.display = 'none';
                    consoleDiv.style.display = 'block';
                    runBtn.disabled = false;
                    consoleDiv.innerText = "Network Error: Please check your internet connection.";
                    consoleDiv.style.color = "#FF5252";
                }
            }
        }

        function updatePreview() {
            const iframe = document.getElementById('webPreview');
            const html = codeStore['html'];
            const css = `<style>${codeStore['css']}</style>`;
            const js = `<script>${codeStore['js']}<\/script>`; 
            
            iframe.srcdoc = html + css + js;
        }

        function clearOutput() {
            if(currentMode === 'web') return; 
            const consoleDiv = document.getElementById('consoleOutput');
            consoleDiv.innerText = "";
            consoleDiv.style.color = "#ccc";
        }

        // Tab Key Support in Textarea
        document.getElementById('codeEditor').addEventListener('keydown', function(e) {
            if (e.key == 'Tab') {
                e.preventDefault();
                var start = this.selectionStart;
                var end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });
    </script>
</body>
</html>
