<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learning Videos - GIG</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium GIG Theme Colors */
            --bg-deep: #030014;
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --neon-blue: #00F0FF; 
            --neon-purple: #7000FF;
            --neon-red: #FF0055; /* YouTube Red Accent */
            --glass-panel: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 0, 85, 0.08) 0%, transparent 60%);
            background-attachment: fixed;
            padding-bottom: 40px;
        }

        /* --- HEADER --- */
        header {
            display: flex; align-items: center; gap: 15px;
            padding: 20px; position: sticky; top: 0; z-index: 100;
            background: rgba(3, 0, 20, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light);
        }
        .back-btn { text-decoration: none; font-size: 22px; color: white; font-weight: bold; }
        .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: white; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* --- SMART FILTERS & SEARCH --- */
        .search-container { 
            position: sticky; top: 70px; z-index: 10; padding: 10px 0 20px 0;
            background: transparent; 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .filter-item { 
            flex: 1; display: flex; align-items: center; gap: 5px; 
            background: rgba(255,255,255,0.05); padding: 10px; 
            border-radius: 8px; border: 1px solid var(--border-light);
        }
        .filter-item select {
            background: transparent; border: none; color: white; width: 100%;
            outline: none; font-size: 12px; font-weight: 600; cursor: pointer;
        }
        select option { background: #0F172A; color: white; }

        .search-input {
            width: 100%; padding: 14px 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-light); border-radius: 12px; color: white; font-size: 14px; outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--neon-red); background: rgba(255, 0, 85, 0.05); }

        /* --- VIDEO CARDS --- */
        .videos-list { display: flex; flex-direction: column; gap: 15px; }
        
        .video-card {
            background: var(--glass-panel); border: 1px solid var(--border-light);
            border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px;
            transition: 0.3s; animation: slideUp 0.3s ease; cursor: pointer; text-decoration: none; color: white;
        }
        .video-card:hover { border-color: var(--neon-red); transform: translateX(5px); background: rgba(255,255,255,0.06); }
        .video-card:active { transform: scale(0.98); }
        
        /* Thumbnail Styles */
        .thumb-wrapper {
            position: relative; width: 130px; height: 80px; border-radius: 10px; overflow: hidden;
            flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .video-thumb { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .video-card:hover .video-thumb { transform: scale(1.05); }
        
        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; opacity: 0.8; transition: 0.3s;
        }
        .video-card:hover .play-overlay { background: rgba(255,0,85,0.4); opacity: 1; }

        /* Info Styles */
        .video-info { flex: 1; }
        .video-title { font-weight: 800; font-size: 15px; margin-bottom: 6px; line-height: 1.3; }
        .video-meta { font-size: 11px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        
        .btn-watch {
            background: rgba(255, 0, 85, 0.1); color: var(--neon-red);
            border: 1px solid rgba(255, 0, 85, 0.3); text-decoration: none;
            padding: 8px 12px; border-radius: 8px; font-weight: 800; font-size: 10px;
            text-transform: uppercase; display: inline-block; margin-top: 8px;
        }
        .video-card:hover .btn-watch { background: var(--neon-red); color: white; }

        .loading-state { text-align: center; padding: 40px; color: var(--neon-red); font-weight: bold; font-size: 14px; }
        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px; line-height: 1.5; }

        @media (max-width: 480px) {
            .thumb-wrapper { width: 100px; height: 70px; }
            .video-title { font-size: 14px; }
        }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <a href="homepage.html" class="back-btn">←</a>
        <div class="page-title">Learning Videos</div>
    </header>

    <div class="container">
        
        <div class="search-container">
            <div class="filter-bar">
                <div class="filter-item">
                    <span>📅</span>
                    <select id="filterSem" onchange="applyFilters()">
                        <option value="all">All Semesters</option>
                        <option value="1st Sem">1st Sem</option><option value="2nd Sem">2nd Sem</option>
                        <option value="3rd Sem">3rd Sem</option><option value="4th Sem">4th Sem</option>
                        <option value="5th Sem">5th Sem</option><option value="6th Sem">6th Sem</option>
                    </select>
                </div>
            </div>

            <input type="text" class="search-input" id="searchVideo" placeholder="Search for subjects or topics..." onkeyup="applyFilters()">
        </div>

        <div class="videos-list" id="videosContainer">
            <div class="loading-state">Fetching Video Library...</div>
        </div>

    </div>

    <script src="api.js"></script>

    <script>
        // Secure Back-button logic
        window.addEventListener('pageshow', function (event) {
            if (!getGIGSession()) window.location.replace('login.html');
        });

        let currentUser = null;
        let allVideosData = [];

        window.onload = async function() {
            currentUser = getGIGSession(); 
            if(!currentUser) {
                window.location.replace('login.html');
                return;
            }

            // 1. Auto-fill the ONLY filter from user profile
            document.getElementById('filterSem').value = currentUser.sem || 'all';

            // 2. Fetch data from Google Sheets ("Learning Videos" tab)
            allVideosData = await GIG_API.getResources('Learning Videos');
            
            if(!Array.isArray(allVideosData) || allVideosData.error) {
                document.getElementById('videosContainer').innerHTML = '<div class="loading-state" style="color:var(--text-muted)">Failed to load videos. Please check your connection.</div>';
                return;
            }

            // 3. Render immediately based on user's auto-filled data
            applyFilters();
        };

        // --- THUMBNAIL FETCHER ---
        function getYoutubeThumbnail(url) {
            let videoId = null;
            
            // Try to extract ID from standard or shortened YouTube links
            if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('watch?v=')) {
                videoId = url.split('watch?v=')[1].split('&')[0];
            }

            if (videoId) {
                // Fetch the high-quality default thumbnail from YouTube
                return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            } else {
                // If it's a playlist or invalid link, return a premium tech/video fallback image
                return 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=600&auto=format&fit=crop';
            }
        }

        function applyFilters() {
            const container = document.getElementById('videosContainer');
            let query = document.getElementById('searchVideo').value.toLowerCase().trim();
            let sem = document.getElementById('filterSem').value;

            // Try to get results using the active filter
            let filtered = getFilteredResults(query, sem);

            // SMART SEARCH LOGIC: If search yields no results in specific sem, search the entire database
            if (query && filtered.length === 0) {
                let globalSearch = getFilteredResults(query, 'all');
                
                if (globalSearch.length > 0) {
                    document.getElementById('filterSem').value = 'all'; // visually reset
                    filtered = globalSearch; 
                }
            }

            renderVideos(filtered);
        }

        function getFilteredResults(query, sem) {
            return allVideosData.filter(row => {
                // Based on your Google Sheet: Col A (0)=Sem, Col B (1)=Subject, Col C (2)=Link
                if(!row || row.length < 3) return false;

                let rowSem = (row[0] || "").toString().toLowerCase().trim();
                let rowSub = (row[1] || "").toString().toLowerCase().trim();

                let matchSem = (sem === 'all') || (rowSem === sem.toLowerCase());
                
                // Match Search box
                let matchQuery = true;
                if(query) {
                    let combinedStr = `${rowSem} ${rowSub}`.toLowerCase();
                    matchQuery = combinedStr.includes(query);
                }

                return matchSem && matchQuery;
            });
        }

        function renderVideos(list) {
            const container = document.getElementById('videosContainer');
            
            if(list.length === 0) {
                container.innerHTML = '<div class="empty-state">🎥 No Videos found for this selection.<br><br>Try adjusting the semester or use the search bar to explore all classes.</div>';
                return;
            }

            let html = '';
            list.forEach(row => {
                let sem = row[0];
                let subject = row[1];
                let link = row[2];
                
                // Generate the dynamic thumbnail
                let thumbUrl = getYoutubeThumbnail(link);

                // Made the entire card clickable, not just the button!
                html += `
                    <a href="${link}" target="_blank" class="video-card">
                        <div class="thumb-wrapper">
                            <img src="${thumbUrl}" class="video-thumb" alt="Thumbnail" onerror="this.src='https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=600&auto=format&fit=crop'">
                            <div class="play-overlay">▶</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">${subject}</div>
                            <div class="video-meta">${sem}</div>
                            <div class="btn-watch">WATCH NOW</div>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
